name: ride_app
description: Ride - Rolês e Viagens de Moto
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Navigation
  go_router: ^13.2.0

  # Supabase
  supabase_flutter: ^2.5.0

  # Maps
  google_maps_flutter: ^2.9.0

  # UI
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Utils
  intl: ^0.19.0
  timeago: ^3.6.1
  url_launcher: ^6.3.0
  geolocator: ^13.0.2
  http: ^1.2.2
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
